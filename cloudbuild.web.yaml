# CI/CD for apps/web: build the image and roll it out to Cloud Run.
#
# Intentionally does NOT set env vars: the service keeps the env from the
# last scripts/gcp/deploy_web_cloudrun.sh run, so no secrets live in the repo.
#
# One-time setup (after connecting the GitHub repo in the console):
#   gcloud builds triggers create github \
#     --project nlp2026-498021 \
#     --name deploy-llm-craft-web \
#     --repo-owner ivandda --repo-name llm-craft \
#     --branch-pattern '^main$' \
#     --included-files 'apps/web/**,cloudbuild.web.yaml' \
#     --build-config cloudbuild.web.yaml \
#     --require-approval
#
# --require-approval holds every build until a project owner approves it in
# the Cloud Build console, so pushes to main never deploy silently.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/llm-craft-registry/llm-craft-web:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/llm-craft-registry/llm-craft-web:latest
      - apps/web
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/llm-craft-registry/llm-craft-web
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - llm-craft-web
      - --project=$PROJECT_ID
      - --region=us-central1
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/llm-craft-registry/llm-craft-web:$SHORT_SHA
      - --quiet
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/llm-craft-registry/llm-craft-web:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/llm-craft-registry/llm-craft-web:latest
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: 1200s
