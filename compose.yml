services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-craft-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llm_craft}
      POSTGRES_USER: ${POSTGRES_USER:-llm_craft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llm_craft_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./var/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
