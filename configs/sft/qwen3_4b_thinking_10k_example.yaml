# Qwen3-4B Thinking sobre final-10k usando chat template de Qwen.
model_name_or_path: Qwen/Qwen3-4B-Thinking-2507
train_path: datasets/final-10k/train.jsonl
dev_path: datasets/final-10k/dev.jsonl
output_dir: runs/sft
run_name: qwen3_4b_thinking_10k
prompt_format: qwen_chat
system_prompt: You combine two concepts into one resulting concept.
loss_type: concept_set
ce_target: rank1
num_train_epochs: 3
max_steps: -1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 2.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
max_seq_length: 512
max_grad_norm: 1.0
logging_steps: 20
eval_steps: 100
save_steps: 200
save_total_limit: 3
seed: 42
bf16: true
fp16: false
gradient_checkpointing: true
load_in_4bit: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: auto
resume_from_checkpoint: null
max_train_examples: null
max_dev_examples: 1291
length_normalize_concept_logprob: true
weight_field: weight
weight_fallback: inverse_rank
trust_remote_code: false
dataloader_num_workers: 0
