model_name_or_path: sshleifer/tiny-gpt2
train_path: datasets/final-small-dataset/train.jsonl
dev_path: datasets/final-small-dataset/dev.jsonl
output_dir: runs/sft
run_name: smoke_tiny_concept_set
# Optional alias:
# ce                  -> uniform + expected_logprob
# soft_ce             -> dataset + expected_logprob
# concept_set         -> dataset + logsumexp_prob
# concept_set_uniform -> uniform + logsumexp_prob
loss_type: concept_set
# Legacy no-op kept for backwards compatibility. CE no longer selects a single
# candidate; all acceptable candidates remain in the batch.
ce_target: rank1
num_train_epochs: 1
max_steps: 2
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 2.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
max_seq_length: 256
max_grad_norm: 1.0
logging_steps: 1
eval_steps: 1
save_steps: 2
save_total_limit: 3
seed: 42
bf16: false
fp16: false
gradient_checkpointing: false
load_in_4bit: false
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: auto
resume_from_checkpoint: null
max_train_examples: 8
max_dev_examples: 4
# Experimental: when true, divide each concept log-probability by its token
# length before aggregating by recipe. The main formulation keeps this false.
length_normalize_concept_logprob: false
# Auxiliary rationale term. Keep 0.0 for concept-only SFT; set e.g. 0.2 to
# train on candidate rationales when present in candidate_outputs.
rationale_loss_weight: 0.0
length_normalize_rationale_logprob: true
rationale_position: output_before_rationale
weight_field: weight
weight_fallback: inverse_rank
# Merge repeated (input_a, input_b) recipes, sum duplicate output mass, then
# renormalize candidate weights inside the merged recipe.
merge_duplicate_recipes: true
trust_remote_code: false
dataloader_num_workers: 0
