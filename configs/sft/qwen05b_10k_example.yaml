# Qwen2.5-0.5B (cacheado) sobre final-10k, loss concept_set.
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
train_path: datasets/final-10k/train.jsonl
dev_path: datasets/final-10k/dev.jsonl
output_dir: runs/sft
run_name: qwen05b_10k_concept_set
loss_type: concept_set
ce_target: rank1
num_train_epochs: 3
max_steps: -1            # usa epochs, no corta por pasos
per_device_train_batch_size: 8
per_device_eval_batch_size: 16
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
max_seq_length: 256
max_grad_norm: 1.0
logging_steps: 20
eval_steps: 150
save_steps: 300
save_total_limit: 3
seed: 42
bf16: true
fp16: false
gradient_checkpointing: true
load_in_4bit: false       # en un 0.5B el 4-bit es mas lento y no hace falta
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: auto
resume_from_checkpoint: null
max_train_examples: null
max_dev_examples: 500
length_normalize_concept_logprob: false
weight_field: weight
weight_fallback: inverse_rank
trust_remote_code: false
dataloader_num_workers: 0
