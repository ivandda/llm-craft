# Configuración del Pipeline de llm-craft

# Paso 1: Normalización (normalize.py)
normalization:
  raw_dir: "datasets/raw"
  processed_dir: "datasets/processed"
  # Toggle cuales raw datasets incluir en la normalización
  raw_datasets:
    ericlewis: true
    elementia: true
    expitau: true
    redfast00: true

# Paso 2: Limpieza y Splits (clean.py)
cleaning:
  # Normalizar todo a minúsculas
  lowercase_all: true
  # Filtrar conceptos ruidosos (números puros, hashes, caracteres extraños)
  filter_garbage: true
  # Filtrar recetas para SFT/evaluacion limpia de sentido comun.
  filter_quality: true
  untrusted_sources:
    - expitau
  untrusted_source_prefixes:
    - ericlewis_
  require_trusted_vocab_for_untrusted: true
  reject_sample_limit: 500
  quality:
    max_words: 3
    max_chars: 36
    min_token_chars: 2
    reject_digits: true
    reject_gerund_phrases: true
    reject_sentence_words: true
    reject_vowelless_tokens_min_len: 4
    suspicious_suffixes:
      - nado
    placeholder_tokens:
      - undefined
      - unknown
      - null
      - none
  # Proporciones de los conjuntos
  split_ratio:
    train: 0.80
    dev: 0.10
    test: 0.10

# Paso 3: Exportación de recetas mínimas (export_sft.py)
recipe_export:
  # Si es True, excluye copias triviales donde el output es idéntico a una de las entradas
  exclude_identities: true

# Paso 4: Exportación de Sets de Evaluación (export_eval.py)
evaluation_export:
  # Mantener eval humanamente revisable: input_a, input_b, known_outputs.
  include_pair_id: false
  include_canonical_output: false
  # Cada size acepta un entero positivo o "all" para exportar todo el split.
  sizes:
    dev_keep: all
    test_keep: all
